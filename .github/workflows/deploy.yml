name: Deploy to Windows Laptop
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Run
        # This line forces PowerShell to ignore system execution policies for this step
        shell: powershell -ExecutionPolicy Bypass -Command {0}
        run: |
          # Check if the container exists before attempting to stop/remove it
          if (docker ps -a -q -f name=groq-app) {
              docker stop groq-app
              docker rm groq-app
          }
          # Build the Docker image
          docker build -t groq-app .
          # Run the new container
          docker run -d -p 8501:8501 --name groq-app groq-app