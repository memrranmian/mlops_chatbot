- name: Build and Run
        shell: powershell
        run: |
          # Stop and remove the container only if it exists
          if (docker ps -a -q -f name=groq-app) {
              docker stop groq-app
              docker rm groq-app
          }
          # Build the new image
          docker build -t groq-app .
          # Run the new container
          docker run -d -p 8501:8501 --name groq-app groq-app