name: Deploy to Windows Laptop
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted  # <--- This is the magic line
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Run
        run: |
          docker stop groq-app || true
          docker rm groq-app || true
          docker build -t groq-app .
          docker run -d -p 8501:8501 --name groq-app groq-app