name: Deploy to Windows Laptop
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Run
        # This approach sends the command as a string to avoid 'running scripts is disabled' errors
        run: |
          powershell -ExecutionPolicy Bypass -Command "if (docker ps -a -q -f name=groq-app) { docker stop groq-app; docker rm groq-app }; docker build -t groq-app .; docker run -d -p 8501:8501 --name groq-app groq-app"